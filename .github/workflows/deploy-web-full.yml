name: Deploy Web App (Full Assets)

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Verwendung: nur starten, wenn Musik oder Animationen geaendert wurden oder der Webspace voll synchronisiert werden soll."
        required: false
        default: "Full asset deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy full web bundle first, then index.html
        env:
          BITPALAST_FTP_HOST: ${{ secrets.BITPALAST_FTP_HOST }}
          BITPALAST_FTP_PORT: ${{ secrets.BITPALAST_FTP_PORT }}
          BITPALAST_FTP_USER: ${{ secrets.BITPALAST_FTP_USER }}
          BITPALAST_FTP_PASSWORD: ${{ secrets.BITPALAST_FTP_PASSWORD }}
          BITPALAST_DEPLOY_PATH: ${{ secrets.BITPALAST_DEPLOY_PATH }}
        run: |
          for attempt in 1 2 3; do
            echo "FTPS deploy attempt $attempt/3"
            if lftp -u "$BITPALAST_FTP_USER","$BITPALAST_FTP_PASSWORD" -p "${BITPALAST_FTP_PORT:-21}" "$BITPALAST_FTP_HOST" <<EOF
          set cmd:fail-exit true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:timeout 60
          set net:max-retries 8
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set xfer:clobber true
          mirror -R --delete --verbose=3 --exclude-glob index.html ./dist "$BITPALAST_DEPLOY_PATH"
          put -O "$BITPALAST_DEPLOY_PATH" ./dist/index.html
          bye
          EOF
            then
              exit 0
            fi
            sleep 15
          done
          exit 1
