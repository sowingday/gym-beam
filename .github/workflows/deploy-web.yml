name: Deploy Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy dist via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.BITPALAST_FTP_HOST }}
          username: ${{ secrets.BITPALAST_FTP_USER }}
          password: ${{ secrets.BITPALAST_FTP_PASSWORD }}
          protocol: ftps
          port: ${{ secrets.BITPALAST_FTP_PORT }}
          local-dir: ./dist/
          server-dir: ${{ secrets.BITPALAST_DEPLOY_PATH }}/
          dangerous-clean-slate: false
